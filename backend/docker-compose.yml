services:
  postgres:
    # pgvector image = postgres 16 with the vector extension preinstalled.
    image: pgvector/pgvector:pg16
    container_name: recall-postgres
    environment:
      POSTGRES_USER: recall
      POSTGRES_PASSWORD: recall
      POSTGRES_DB: recall
    ports:
      - "5432:5432"
    volumes:
      - recall-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recall"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: recall-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - recall-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: recall-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RECALL_ENVIRONMENT: development
      RECALL_DATABASE_URL: postgresql+asyncpg://recall:recall@postgres:5432/recall
      RECALL_REDIS_URL: redis://redis:6379/0
      RECALL_SECRET_KEY: dev-insecure-secret-change-me
      RECALL_STORAGE_DIR: /data/storage
      RECALL_STORAGE_PUBLIC_URL: http://localhost:8000/storage
      RECALL_VECTOR_STORE_BACKEND: pgvector
      RECALL_EMBEDDING_PROVIDER: deterministic
      RECALL_VECTOR_DIMENSION: "1024"
      RECALL_RUN_WORKER_IN_PROCESS: "false"
    ports:
      - "8000:8000"
    volumes:
      - recall-storage-data:/data/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build: .
    container_name: recall-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RECALL_ENVIRONMENT: development
      RECALL_DATABASE_URL: postgresql+asyncpg://recall:recall@postgres:5432/recall
      RECALL_REDIS_URL: redis://redis:6379/0
      RECALL_SECRET_KEY: dev-insecure-secret-change-me
      RECALL_STORAGE_DIR: /data/storage
      RECALL_VECTOR_STORE_BACKEND: pgvector
      RECALL_EMBEDDING_PROVIDER: deterministic
      RECALL_VECTOR_DIMENSION: "1024"
    command: ["python", "-m", "app.workers.run"]
    volumes:
      - recall-storage-data:/data/storage

volumes:
  recall-postgres-data:
  recall-redis-data:
  recall-storage-data:
